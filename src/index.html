<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-4" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crypto App</title>
    <script type="module" src="main.js" defer></script>
</head>

<body>
    <form id="crypto_frm">

        <div class="form-group">
            <label>Encryption-Decryption</label>
        </div>
        <div class="form-group">
            <textarea required placeholder="Give your plain or chaper text..." id="text_input" rows="4"></textarea>
        </div>

        <div class="form-group">
            <input required placeholder="The secret key..." id="key" type="password">
        </div>
        <div class="form-group" id="select_algo">
            <label>Wich Algoritm?</label>
            <div>
                <input type="radio" checked name="encrypt_algo" value="Aes" id="Aes">
                <label for="Aes">AES</label>

            </div>
            <div>
                <input type="radio" name="encrypt_algo" value="Chacha" id="Chacha">
                <label for="Chacha">Chacha</label>
            </div>

        </div>
        <div class="form-group">
            <textarea readonly placeholder="Press the encrypt or decrypt button to see result..." id="text_output"
                rows="4"></textarea>
        </div>

        <div class="action-group">
            <button id="encrypt_btn" type="button">
                <img src="assets/lockpng.png" alt="">
            </button>

            <button id="decrypt_btn" type="button">

                <img src="assets/unlockpng.png" alt="">
            </button>
            <button id="copy_btn" type="button">
                <img src="assets/copy.svg" alt="">
            </button>
        </div>
        <div class="form-group">
            <p id="error_msg"></p>
        </div>

    </form>

</body>

</html>
