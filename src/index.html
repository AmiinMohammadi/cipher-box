<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crypto App</title>
    <script type="module" src="main.js" defer></script>
</head>

<body>

    <div id="tabs">
        <button id="encrypt_tab">Encryption</button>
        <button id="decrypt_tab">Decryption</button>
    </div>

    <main class="container">

        <form id="decrypt_frm" class="crypto_form">

            <div class="form-group">
                <label>Decrypt your cheaper text</label>
            </div>
            <div class="form-group">
                <textarea id="decrypt_input" rows="4"></textarea>
            </div>

            <div class="form-group">
                <input id="decrypt_key" type="password">
            </div>

            <div class="action-group">
                <button id="decrypt_generate" type="button">Generate</button>
                <button id="decrypt_output_copy" type="button">Copy</button>
            </div>

            <div class="form-group">
                <textarea id="decrypt_output" rows="4"></textarea>
            </div>

        </form>

        <form id="encrypt_frm" class="crypto_form">
            <div class="form-group">
                <label>Encrypt your plain text</label>
            </div>

            <div class="form-group">
                <textarea id="encrypt_input" rows="4"></textarea>
            </div>

            <div class="form-group">
                <input id="encrypt_key" type="password">
            </div>

            <div class="action-group">
                <button id="encrypt_generate" type="button" >Generate</button>
                <button id="encrypt_output_copy" type="button">Copy</button>
            </div>

            <div class="form-group">
                <textarea id="encrypt_output" rows="4"></textarea>
            </div>

        </form>
    </main>
</body>

</html>
