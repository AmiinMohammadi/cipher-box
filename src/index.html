<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crypto App</title>
    <script type="module" src="main.js" defer></script>
</head>

<body>
    <form id="encrypt_frm">

        <div class="form-group">
            <label>Encryption</label>
        </div>
        <div class="form-group">
            <textarea placeholder="Give your plain-text" id="encrypt_input" rows="8"></textarea>
        </div>

        <div class="form-group">
            <input placeholder="The secret key..." id="encrypt_key" type="password">
        </div>

        <div class="action-group">
            <button  id="generate_encrypt_btn" type="button">
                <img src="assets/generate.svg" alt="">
            </button>
            <button id="copy_output_btn" type="button">
                <img src="assets/copy.svg" alt="">
            </button>
        </div>

        <div class="form-group">
            <textarea readonly placeholder="Press the generate button to see result..." id="encrypt_output"
                rows="8"></textarea>
        </div>

    </form>
